<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图器 3.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;590&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <!-- 顶部导航栏 -->
    <nav class="navbar">
      <div class="navbar-container">
        <h1 class="logo"><span class="logo-icon">🕳️</span> 图器 3.0</h1>
        <div class="status-info">
          <span id="taskCounter" class="task-counter">当前任务: 0</span>
          <span id="statusIndicator" class="status-indicator online">● 已连接</span>
        </div>
      </div>
    </nav>

    <!-- 主体区域：左侧功能区 + 右侧历史面板 -->
    <div class="app-body">
      <!-- 左侧功能面板（75%） -->
      <section class="main-panel">
        <!-- 选项卡导航 -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="text2img">文生图</button>
          <button class="tab-btn" data-tab="img2img">图生图</button>
          <button class="tab-btn" data-tab="gridsplit">宫格拆分</button>
        </div>

        <!-- 选项卡内容 -->
        <div class="tab-content">
        <!-- 文生图 -->
      <div id="text2img" class="tab-pane active">
        <div class="container">
          <h2>文本生成图片</h2>
          <form id="text2imgForm" class="form">
            <div class="form-group">
              <label for="text2imgModel">选择模型：</label>
              <select id="text2imgModel" class="select">
                <option value="nano-banana-2" selected>Banana-2 (推荐，快速)</option>
                <option value="gpt-image-2">GPT Image-2 (高清，Base64)</option>
              </select>
            </div>

            <div class="form-group">
              <label for="text2imgPrompt">提示词：</label>
              <textarea
                id="text2imgPrompt"
                class="textarea"
                placeholder="输入详细的图片描述..."
                rows="6"
              ></textarea>
              <div class="char-count">
                <span id="text2imgCount">0</span> 字符
              </div>
            </div>
            <button type="submit" class="btn btn-primary">生成图片</button>
            <p class="submit-tip">✓ 提交后会自动添加到历史记录中</p>
          </form>
        </div>
      </div>

      <!-- 图生图 -->
      <div id="img2img" class="tab-pane">
        <div class="container">
          <h2>图片生成图片</h2>
          <form id="img2imgForm" class="form">
            <div class="form-group">
              <label for="img2imgModel">选择模型：</label>
              <select id="img2imgModel" class="select">
                <option value="nano-banana-2" selected>Banana-2 (推荐，快速)</option>
                <option value="gpt-image-2">GPT Image-2 (高清，Base64)</option>
              </select>
            </div>

            <div class="form-group">
              <label for="img2imgFile">上传本地图片（可多选）：</label>
              <input type="file" id="img2imgFile" accept="image/*" multiple class="file-input">
              <div id="img2imgFilePreview" class="file-preview"></div>
            </div>

            <div class="form-group">
              <label for="img2imgUrls">或输入图片 URLs (换行分隔)：</label>
              <textarea
                id="img2imgUrls"
                class="textarea"
                placeholder="输入图片 URL，多个 URL 用换行分隔"
                rows="3"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="img2imgPrompt">提示词：</label>
              <textarea
                id="img2imgPrompt"
                class="textarea"
                placeholder="输入修改或创意指示..."
                rows="6"
              ></textarea>
              <div class="char-count">
                <span id="img2imgCount">0</span> 字符
              </div>
            </div>

            <button type="submit" class="btn btn-primary">生成图片</button>
            <p class="submit-tip">✓ 提交后会自动添加到历史记录中</p>
          </form>
        </div>
      </div>

      <!-- 宫格拆分 -->
      <div id="gridsplit" class="tab-pane">
        <div class="container">
          <h2>宫格拆分</h2>
          <p class="section-desc">将九宫格/四宫格分镜图自动拆分为单张独立图片（基于腾讯云 MPS AI 分镜识别）</p>

          <form id="gridSplitForm" class="form">
            <!-- 图片输入区（仅支持 URL） -->
            <div class="form-group">
              <label for="gridImageUrl">输入图片 URL：</label>
              <input
                type="text"
                id="gridImageUrl"
                class="input"
                placeholder="https://example.com/storyboard.jpg"
              >
            </div>

            <!-- 网格类型选择 -->
            <div class="form-group">
              <label for="gridTypeSelect">网格类型：</label>
              <select id="gridTypeSelect" class="select">
                <option value="4" selected>四宫格 (2×2)</option>
                <option value="9">九宫格 (3×3)</option>
              </select>
            </div>

            <button type="submit" id="gridSplitBtn" class="btn btn-primary">
              <span id="gridSplitBtnText">开始拆分</span>
              <span id="gridSplitSpinner" class="btn-spinner hidden"></span>
            </button>
            <p class="submit-tip">⏱ 拆分过程需要 30~90 秒（取决于网格大小），请耐心等待</p>
          </form>

          <!-- 进度显示 -->
          <div id="gridProgress" class="progress-section hidden">
            <div class="progress-bar-container">
              <div id="gridProgressBar" class="progress-bar"></div>
            </div>
            <p id="gridStatusText" class="status-text">正在处理...</p>
          </div>

          <!-- 拆分结果展示 -->
          <div id="gridResultSection" class="result-section hidden">
            <h3 class="result-title">
              <span>拆分结果</span>
              <span id="gridResultMeta" class="result-meta"></span>
            </h3>
            <div id="gridResultGrid" class="grid-result-grid"></div>
            <div id="gridResultActions" class="result-actions">
              <button id="downloadAllBtn" class="btn btn-small">下载全部</button>
            </div>
          </div>
        </div>
      </div>
      </div><!-- /.tab-content -->
    </section><!-- /.main-panel -->

    <!-- 可拖拽分栏把手 -->
    <div class="resize-handle" id="resizeHandle" title="拖拽调节宽度"></div>

    <!-- 历史记录侧边栏（右侧可调） -->
    <aside class="history-sidebar">
      <div class="history-sidebar-header">
        <h2>📋 历史记录</h2>
      </div>
      <div id="historyControls" class="history-controls">
        <button id="refreshHistoryBtn" class="btn btn-small">刷新</button>
        <button id="clearHistoryBtn" class="btn btn-small btn-danger">一键清空</button>
      </div>
      <div id="historyContent" class="history-content"></div>
    </aside>
    </div><!-- /.app-body -->
  </div>

  <!-- 图片放大预览模态框 -->
  <div id="imageModal" class="image-modal">
    <span id="closeModal" class="modal-close">&times;</span>
    <img id="modalImage" class="modal-content">
  </div>

  <script src="/app.js"></script>
</body>
</html>
